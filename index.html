<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azumi Analytics — Data & AI Consultancy</title>
  <meta name="description" content="Azumi Analytics is a data consultancy firm helping businesses turn raw data into confident decisions through analytics, data engineering, AI/ML, NLP and automation.">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Reset & Base */
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #F2F7FA;
      font-family: 'Inter', sans-serif;
      color: #1A2A3A;
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }
    :root {
      --primary: #1B6B9E;
      --primary-deep: #0F2840;
      --primary-light: #3A8BBF;
      --accent: #F2994A;
      --accent-tint: rgba(242, 153, 74, 0.15);
      --bg-soft: rgba(255, 255, 255, 0.7);
      --text-soft: #4A5A6A;
      --border: rgba(27, 107, 158, 0.1);
      --font-head: 'Poppins', sans-serif;
      --font-body: 'Inter', sans-serif;
      --shadow-sm: 0 8px 30px rgba(27, 107, 158, 0.08);
      --shadow-lg: 0 20px 50px -12px rgba(27, 107, 158, 0.15);
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(27, 107, 158, 0.08);
    }
    .container { max-width: 1240px; margin: 0 auto; padding: 0 2rem; }

    /* Skip link */
    .skip-link { position:absolute; left:-9999px; top:0; padding:1rem 1.5rem; background:var(--primary); color:#fff; z-index:9999; font-weight:600; border-radius:0 0 8px 0; }
    .skip-link:focus { left:0; }
    @media (prefers-reduced-motion: reduce) { * { animation-duration:0.001ms !important; transition-duration:0.001ms !important; } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #F2F7FA; }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* Navbar - Enhanced Logo */
    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 2rem; margin-top: 0.5rem;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      border: 1px solid rgba(27, 107, 158, 0.08);
      box-shadow: 0 4px 30px rgba(27, 107, 158, 0.08);
      flex-wrap: wrap; gap: 1rem;
    }
    .logo-container { 
      display:flex; 
      align-items:center; 
      gap:1.2rem;
      text-decoration: none;
    }
    .logo-img { 
      height:56px; 
      width:auto; 
      max-width:200px; 
      object-fit:contain;
      filter: drop-shadow(0 2px 4px rgba(27, 107, 158, 0.1));
    }
    .logo-text-wrapper {
      display: flex;
      flex-direction: column;
      border-left: 3px solid var(--accent);
      padding-left: 1.2rem;
    }
    .logo-text {
      font-family: var(--font-head); 
      font-weight:800; 
      font-size:1.6rem;
      color: var(--primary-deep); 
      letter-spacing:-0.02em;
      line-height: 1.1;
    }
    .logo-text span { color:var(--accent); }
    .logo-text .small { 
      font-size:0.6rem; 
      font-weight:500; 
      color:var(--text-soft); 
      display:block; 
      letter-spacing:0.05em;
      text-transform: uppercase;
      margin-top: 0.05rem;
    }
    .nav-links { display:flex; align-items:center; gap:2rem; flex-wrap:wrap; }
    .nav-links a { text-decoration:none; font-weight:600; font-size:0.95rem; color:var(--text-soft); padding-bottom:4px; border-bottom:2px solid transparent; transition:0.2s; cursor:pointer; }
    .nav-links a:hover, .nav-links a.active { color:var(--primary); border-bottom-color:var(--accent); }
    .nav-cta { 
      background:var(--accent); 
      color:#fff !important; 
      padding:0.7rem 1.8rem; 
      border-radius:50px; 
      border-bottom:none !important; 
      font-weight:600 !important; 
      transition:0.2s;
      box-shadow: 0 4px 15px rgba(242, 153, 74, 0.3);
    }
    .nav-cta:hover { 
      background:var(--primary); 
      transform:translateY(-2px); 
      color:#fff !important;
      box-shadow: 0 6px 20px rgba(27, 107, 158, 0.3);
    }
    .breadcrumb { font-size:0.85rem; color:var(--text-soft); padding:0.5rem 0 1.5rem; }
    .breadcrumb span { color:var(--primary); font-weight:600; }

    /* Pages */
    .page-section { display:none; padding:0.5rem 0 2rem; animation:fadeUp 0.5s ease; }
    .page-section.active { display:block; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .eyebrow {
      display:inline-flex; align-items:center; gap:0.5rem;
      background:var(--accent-tint); color:#B5651D; font-weight:600; font-size:0.8rem;
      padding:0.4rem 1.2rem; border-radius:50px; margin-bottom:1rem;
    }
    .section-title { font-family:var(--font-head); font-weight:700; font-size:2.4rem; color:var(--primary-deep); margin-bottom:0.7rem; line-height:1.2; }
    .section-title .highlight { color:var(--accent); }
    .section-sub { color:var(--text-soft); max-width:640px; font-size:1.05rem; }
    .section-head { text-align:center; margin:0 auto 2.8rem; max-width:720px; }

    /* Hero - Enhanced */
    .hero {
      display: grid; grid-template-columns: 1.05fr 0.95fr; gap:3rem;
      align-items: center; padding:3rem 2.5rem;
      background: linear-gradient(145deg, rgba(27, 107, 158, 0.04) 0%, rgba(242, 153, 74, 0.04) 100%);
      border-radius: 36px; margin: 0.5rem 0 2.5rem;
      position: relative;
      border: 1px solid rgba(27, 107, 158, 0.06);
      box-shadow: 0 4px 40px rgba(27, 107, 158, 0.05);
    }
    .hero h1 { 
      font-family:var(--font-head); 
      font-weight:800; 
      font-size:3.2rem; 
      line-height:1.1; 
      color:var(--primary-deep); 
      letter-spacing:-0.02em;
    }
    .hero h1 .company-name { 
      color:var(--accent); 
      position:relative;
      display: inline-block;
    }
    .hero h1 .company-name::after { 
      content:''; 
      position:absolute; 
      bottom:-4px; 
      left:0; 
      width:100%; 
      height:4px; 
      background:var(--accent); 
      border-radius:4px; 
      opacity:0.4;
    }
    .hero p { 
      font-size:1.15rem; 
      color:var(--text-soft); 
      margin:1.4rem 0 1.8rem; 
      max-width:520px;
      line-height: 1.7;
    }
    .hero-buttons { display:flex; gap:1rem; flex-wrap:wrap; }
    .btn-primary {
      background:var(--primary); color:#fff; border:none; padding:0.95rem 2.5rem;
      border-radius:50px; font-weight:600; font-size:1.05rem; cursor:pointer;
      transition:0.25s; box-shadow:0 12px 28px rgba(27, 107, 158, 0.3);
    }
    .btn-primary:hover { background:var(--primary-deep); transform:translateY(-3px); box-shadow:0 16px 36px rgba(27, 107, 158, 0.4); }
    .btn-outline {
      background:rgba(255,255,255,0.8); backdrop-filter:blur(4px);
      color:var(--primary); border:2px solid var(--primary); padding:0.9rem 2.2rem;
      border-radius:50px; font-weight:600; font-size:1.05rem; cursor:pointer;
      transition:0.25s;
    }
    .btn-outline:hover { background:var(--primary); color:#fff; transform:translateY(-3px); border-color:var(--primary); }
    .trust-badge { 
      margin-top:2rem; 
      display:flex; 
      align-items:center; 
      gap:0.7rem; 
      color:var(--text-soft); 
      font-size:0.9rem; 
      font-weight:500;
      padding: 0.8rem 1.2rem;
      background: rgba(255,255,255,0.7);
      border-radius: 50px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(27, 107, 158, 0.06);
      width: fit-content;
    }
    .trust-badge .stars { color:var(--accent); letter-spacing:2px; font-size:0.85rem; }

    /* Hero Visual - Enhanced */
    .hero-visual { position:relative; height:440px; border-radius:24px; overflow:visible; }
    .hero-slider { position:relative; width:100%; height:100%; border-radius:24px; overflow:hidden; box-shadow:var(--shadow-lg); }
    .hero-slide { position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; transition:opacity 1s ease, transform 1s ease; transform:scale(1.02); border-radius:24px; overflow:hidden; }
    .hero-slide.active { opacity:1; transform:scale(1); z-index:2; }
    .hero-slide img { width:100%; height:100%; object-fit:cover; }
    .hero-slide .slide-overlay { position:absolute; bottom:0; left:0; right:0; padding:1.5rem 1.8rem; background:linear-gradient(transparent, rgba(15, 40, 64, 0.9)); color:#fff; }
    .hero-slide .slide-overlay .slide-icon { background:var(--accent); color:#fff; padding:0.15rem 0.8rem; border-radius:6px; font-size:0.7rem; font-weight:600; text-transform:uppercase; }
    .hero-slide .slide-overlay h4 { font-family:var(--font-head); font-size:1.1rem; font-weight:600; margin:0.2rem 0 0.05rem; }
    .hero-slide .slide-overlay p { font-size:0.85rem; opacity:0.9; margin:0; }
    .hero-slider-controls { position:absolute; bottom:1rem; right:1.5rem; z-index:10; display:flex; gap:0.5rem; }
    .hero-slider-controls button { width:12px; height:12px; border-radius:50%; border:2px solid rgba(255,255,255,0.5); background:transparent; cursor:pointer; transition:0.3s; padding:0; }
    .hero-slider-controls button.active { background:var(--accent); border-color:var(--accent); transform:scale(1.2); }

    /* Floating Metrics - Enhanced */
    .floating-metrics { position:absolute; right:-20px; top:20px; z-index:5; display:flex; flex-direction:column; gap:0.8rem; }
    .float-card {
      background:rgba(255, 255, 255, 0.95); backdrop-filter:blur(12px);
      padding:0.6rem 1.4rem 0.6rem 1rem; border-radius:40px;
      box-shadow:0 8px 24px rgba(27, 107, 158, 0.12); border:1px solid rgba(27, 107, 158, 0.08);
      display:flex; align-items:center; gap:0.7rem;
      font-weight:600; font-size:0.85rem; color:var(--primary-deep);
      transition:0.2s;
    }
    .float-card:hover { transform:translateX(-4px); border-color:var(--accent); box-shadow:0 8px 30px rgba(242, 153, 74, 0.15); }
    .float-card i { color:var(--accent); font-size:1.1rem; width:1.5rem; text-align:center; }
    .float-card span { font-weight:700; color:var(--primary); font-size:0.95rem; }

    /* Numbers */
    .numbers {
      background: linear-gradient(135deg, var(--primary-deep) 0%, var(--primary) 100%);
      border-radius:28px; padding:3rem 2rem; margin:3.5rem 0;
      display:grid; grid-template-columns:repeat(4,1fr); gap:1.5rem; text-align:center;
      position:relative; overflow:hidden;
      box-shadow:0 12px 40px rgba(27, 107, 158, 0.15);
    }
    .numbers::before { content:''; position:absolute; top:-40%; right:-10%; width:300px; height:300px; background:radial-gradient(circle, rgba(242,153,74,0.08) 0%, transparent 70%); border-radius:50%; }
    .number-item { position:relative; z-index:1; }
    .number-item h3 { font-family:var(--font-head); font-size:2.8rem; font-weight:700; color:#fff; }
    .number-item p { color:#CFE3ED; font-size:0.95rem; margin-top:0.2rem; }

    /* Expertise Cards */
    .expertise-grid-home {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:1.8rem;
    }
    .expertise-card-home {
      background:var(--card-bg); backdrop-filter:blur(8px);
      border:1px solid var(--card-border); border-radius:20px; padding:1.8rem 1.6rem;
      transition:all 0.35s cubic-bezier(0.2, 0, 0, 1);
      cursor:pointer; text-decoration:none; color:inherit;
      position:relative; overflow:hidden;
    }
    .expertise-card-home:hover { transform:translateY(-8px) scale(1.01); box-shadow:var(--shadow-lg); border-color:rgba(242,153,74,0.3); background:rgba(255,255,255,0.98); }
    .expertise-card-home .card-icon { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; color:#fff; margin-bottom:1.2rem; transition:0.3s; }
    .expertise-card-home:hover .card-icon { transform:scale(1.05) rotate(2deg); }
    .expertise-card-home h4 { font-family:var(--font-head); font-size:1.1rem; font-weight:600; color:var(--primary-deep); }
    .expertise-card-home p { color:var(--text-soft); font-size:0.92rem; margin-top:0.4rem; }
    .learn-more { display:inline-flex; align-items:center; gap:0.4rem; color:var(--primary); font-weight:600; font-size:0.9rem; margin-top:1rem; }

    /* Why */
    .why-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:1.6rem; }
    .why-item { padding:1.8rem; border-radius:20px; background:var(--card-bg); backdrop-filter:blur(4px); border:1px solid var(--card-border); transition:0.3s; }
    .why-item:hover { transform:translateY(-4px); box-shadow:var(--shadow-sm); border-color:rgba(242,153,74,0.15); }
    .why-item .card-icon { background:var(--accent-tint); color:var(--accent); width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:1rem; font-size:1.1rem; }

    /* CTA */
    .cta-band { position:relative; border-radius:32px; overflow:hidden; margin:4.5rem 0; padding:4rem 2rem; text-align:center; }
    .cta-band img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
    .cta-band::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg, rgba(15, 40, 64, 0.92), rgba(27, 107, 158, 0.88)); z-index:1; }
    .cta-band-content { position:relative; z-index:2; max-width:640px; margin:0 auto; }
    .cta-band h2 { font-family:var(--font-head); font-size:2.2rem; font-weight:700; color:#fff; }
    .cta-band h2 .azumi { color:var(--accent); }
    .cta-band p { color:#DCEAF1; margin-bottom:2rem; font-size:1.05rem; }
    .cta-band .btn-primary { background:var(--accent); box-shadow:0 12px 28px rgba(242,153,74,0.3); }
    .cta-band .btn-primary:hover { background:#d97f34; }

    /* Tools */
    .tools-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:1rem; }
    .tool-item { 
      display:flex; flex-direction:column; align-items:center; gap:0.5rem; 
      padding:1rem 0.5rem; border-radius:16px; 
      background:rgba(255,255,255,0.85); 
      backdrop-filter:blur(4px); 
      border:1px solid var(--card-border); 
      transition:all 0.3s ease;
      min-height: 85px;
      justify-content: center;
    }
    .tool-item:hover { 
      background:#ffffff; 
      box-shadow:var(--shadow-sm); 
      transform:translateY(-3px); 
      border-color:rgba(242,153,74,0.25);
    }
    .tool-item .tool-icon { font-size:28px; }
    .tool-item .custom-icon { 
      height:34px; 
      width:34px; 
      border-radius:8px; 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      font-weight:700; 
      color:#fff; 
      font-family:var(--font-head); 
      font-size:0.8rem;
      flex-shrink:0;
    }
    .tool-item .tool-name { 
      font-size:0.6rem; 
      font-weight:600; 
      color:var(--text-soft); 
      text-align:center;
      margin-top: 2px;
    }

    /* Services Detailed */
    .expertise-grid-detailed { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:2rem; }
    .expertise-card-detailed { background:var(--card-bg); backdrop-filter:blur(8px); border:1px solid var(--card-border); border-radius:24px; padding:1.8rem; transition:all 0.35s ease; overflow:hidden; }
    .expertise-card-detailed:hover { transform:translateY(-6px); box-shadow:var(--shadow-lg); border-color:rgba(242,153,74,0.15); }
    .expertise-card-detailed .expertise-img { width:100%; height:150px; object-fit:cover; border-radius:14px; margin-bottom:1rem; transition:transform 0.5s ease; }
    .expertise-card-detailed:hover .expertise-img { transform:scale(1.02); }
    .card-header { display:flex; align-items:center; gap:1rem; margin-bottom:0.8rem; }
    .card-header .card-icon { margin-bottom:0; width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1rem; color:#fff; flex-shrink:0; }
    .card-header h3 { font-family:var(--font-head); font-size:1.2rem; font-weight:600; color:var(--primary-deep); }
    .expertise-card-detailed ul { list-style:none; }
    .expertise-card-detailed ul li { padding:0.4rem 0 0.4rem 1.6rem; position:relative; color:var(--text-soft); font-size:0.92rem; border-bottom:1px solid var(--card-border); }
    .expertise-card-detailed ul li::before { content:"\f00c"; font-family:"Font Awesome 6 Free"; font-weight:900; position:absolute; left:0; color:var(--accent); font-size:0.7rem; top:0.55rem; }

    /* Contact */
    .contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:3rem; background:var(--card-bg); backdrop-filter:blur(8px); padding:3rem; border-radius:28px; border:1px solid var(--card-border); }
    .contact-info h3 { font-family:var(--font-head); font-size:1.5rem; color:var(--primary-deep); margin-bottom:1.8rem; }
    .contact-info .info-item { display:flex; align-items:flex-start; gap:1rem; margin-bottom:1.5rem; }
    .contact-info .info-item .card-icon { margin-bottom:0; background:var(--primary); width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#fff; flex-shrink:0; }
    .contact-info .info-item strong { display:block; font-size:0.8rem; color:var(--text-soft); font-weight:600; }
    .contact-form label { display:block; font-weight:600; color:var(--primary-deep); margin:1rem 0 0.3rem; font-size:0.9rem; }
    .contact-form input, .contact-form textarea { width:100%; padding:0.8rem 1rem; border:1px solid var(--card-border); border-radius:14px; font-size:1rem; font-family:var(--font-body); background:rgba(255,255,255,0.6); transition:0.2s; }
    .contact-form input:focus, .contact-form textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-tint); }
    .contact-form .btn-primary { margin-top:1.2rem; width:100%; border-radius:50px; }
    .form-success { background:rgba(46, 204, 113, 0.1); border:1px solid #2ecc71; border-radius:16px; padding:1.5rem; color:#1E5F3A; display:none; }
    .form-success.show { display:block; }
    .contact-form.hidden { display:none; }

    /* Footer */
    .footer { margin-top:4rem; padding:3.5rem 2rem 2rem; background: linear-gradient(135deg, var(--primary-deep) 0%, #0A2A3D 100%); color:#fff; border-radius:32px 32px 0 0; border-top:3px solid var(--accent); width:100vw; margin-left:calc(-50vw + 50%); padding-left:calc(50vw - 50% + 2rem); padding-right:calc(50vw - 50% + 2rem); }
    .footer-inner { max-width:1240px; margin:0 auto; }
    .footer-grid { display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:2.5rem; padding-bottom:2rem; border-bottom:1px solid rgba(255,255,255,0.06); }
    .footer-brand .logo-img { height:40px; margin-bottom:0.8rem; filter:brightness(0) invert(1); }
    .footer-brand .brand-name { font-family:var(--font-head); font-weight:700; font-size:1.2rem; color:#fff; display:block; }
    .footer-brand .brand-name span { color:var(--accent); }
    .footer-brand p { color:#A9C2CF; font-size:0.9rem; max-width:280px; }
    .footer-col h4 { font-family:var(--font-head); font-size:0.95rem; color:#fff; margin-bottom:1.2rem; padding-bottom:0.5rem; position:relative; }
    .footer-col h4::after { content:''; position:absolute; bottom:0; left:0; width:30px; height:2px; background:var(--accent); border-radius:2px; }
    .footer-col ul { list-style:none; }
    .footer-col ul li { margin-bottom:0.5rem; }
    .footer-col ul li a { text-decoration:none; color:#A9C2CF; font-size:0.9rem; transition:0.2s; cursor:pointer; }
    .footer-col ul li a:hover { color:var(--accent); padding-left:4px; }
    .footer-contact-item { display:flex; align-items:center; gap:0.7rem; margin-bottom:0.6rem; color:#A9C2CF; font-size:0.9rem; }
    .footer-contact-item i { color:var(--accent); width:1.1rem; }
    .footer-bottom { display:flex; justify-content:space-between; align-items:center; padding-top:1.5rem; flex-wrap:wrap; gap:1rem; }
    .footer-bottom p { color:#7FA1B2; font-size:0.85rem; }
    .footer-bottom p .azumi { color:var(--accent); font-weight:600; }
    .footer-social a { color:#A9C2CF; margin-left:1.1rem; font-size:1.05rem; transition:0.2s; display:inline-block; }
    .footer-social a:hover { color:var(--accent); transform:translateY(-2px); }

    /* Cookie */
    #cookieConsent { position:fixed; bottom:0; left:0; right:0; background:var(--primary-deep); color:#fff; padding:0.8rem 2rem; display:none; z-index:9999; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:0.8rem; border-top:3px solid var(--accent); }
    #cookieConsent p { font-size:0.85rem; flex:1; min-width:200px; }

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ====== UTILITY HOOKS ======
    function useCounter(target, suffix = '', duration = 2000) {
      const [count, setCount] = useState(0);
      useEffect(() => {
        let start = 0;
        const step = Math.max(target / 60, 0.5);
        const timer = setInterval(() => {
          start = Math.min(start + step, target);
          setCount(Math.round(start));
          if (start >= target) clearInterval(timer);
        }, duration / 60);
        return () => clearInterval(timer);
      }, [target, duration]);
      return count + suffix;
    }

    // ====== PARTICLE BACKGROUND ======
    function ParticleBackground() {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const particles = [];
        const particleCount = 100;
        const colors = [
          { r: 27, g: 107, b: 158 },
          { r: 242, g: 153, b: 74 },
          { r: 58, g: 139, b: 191 },
          { r: 15, g: 40, b: 64 }
        ];

        class Particle {
          constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.size = Math.random() * 4 + 2;
            this.speedX = (Math.random() - 0.5) * 0.8;
            this.speedY = (Math.random() - 0.5) * 0.8;
            this.opacity = Math.random() * 0.3 + 0.4;
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.pulse = Math.random() * Math.PI * 2;
            this.pulseSpeed = 0.02 + Math.random() * 0.02;
          }
          update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.pulse += this.pulseSpeed;
            if (this.x > width) this.x = 0;
            if (this.x < 0) this.x = width;
            if (this.y > height) this.y = 0;
            if (this.y < 0) this.y = height;
          }
          draw() {
            const pulseFactor = 0.7 + 0.3 * Math.sin(this.pulse);
            const currentSize = this.size * pulseFactor;
            ctx.beginPath();
            ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(
              this.x, this.y, 0,
              this.x, this.y, currentSize * 2.5
            );
            gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity * 1.2})`);
            gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity * 0.7})`);
            gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.3)`;
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(this.x, this.y, currentSize * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 0.6})`;
            ctx.fill();
          }
        }

        for (let i = 0; i < particleCount; i++) {
          particles.push(new Particle());
        }

        function animate() {
          ctx.clearRect(0, 0, width, height);
          particles.forEach(p => { p.update(); p.draw(); });
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const dx = particles[i].x - particles[j].x;
              const dy = particles[i].y - particles[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 180) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                const opacity = 0.25 * (1 - dist / 180);
                const color = particles[i].color;
                ctx.strokeStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${opacity})`;
                ctx.lineWidth = 1.2;
                ctx.stroke();
              }
            }
          }
          requestAnimationFrame(animate);
        }
        animate();

        const handleResize = () => {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
        };
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);
      return <canvas ref={canvasRef} className="particle-bg" />;
    }

    // ====== AI CHAT ======
    function AIChat() {
      const [isOpen, setIsOpen] = useState(false);
      const [messages, setMessages] = useState([
        { text: "Hello! I'm Azumi AI Assistant. How can I help you with data analytics, AI, or automation?", sender: 'ai' }
      ]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const messagesEndRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };
      useEffect(scrollToBottom, [messages]);

      const handleSend = async () => {
        if (!input.trim()) return;
        const userMsg = { text: input, sender: 'user' };
        setMessages(prev => [...prev, userMsg]);
        setInput('');
        setIsTyping(true);

        setTimeout(() => {
          const responses = [
            "We specialize in helping businesses turn data into revenue through analytics and AI.",
            "Our team can build custom dashboards that answer your specific business questions.",
            "We've helped 60+ clients automate processes and deploy practical AI solutions.",
            "Would you like to book a free consultation to discuss your project?",
            "We work with startups, NGOs, and enterprises across Africa and beyond."
          ];
          const aiMsg = { text: responses[Math.floor(Math.random() * responses.length)], sender: 'ai' };
          setMessages(prev => [...prev, aiMsg]);
          setIsTyping(false);
        }, 1200);
      };

      return (
        <div className={`chat-widget ${isOpen ? 'open' : ''}`}>
          <button className="chat-toggle" onClick={() => setIsOpen(!isOpen)}>
            <i className="fas fa-comment-dots"></i>
            {!isOpen && <span className="notification-badge">1</span>}

            <div className="chat-container">
              <div className="chat-header">
                <h4>Azumi AI Assistant</h4>
                <p>Ask me about data, analytics, or automation</p>
              </div>
              <div className="chat-messages">
                {messages.map((msg, i) => (
                  <div key={i} className={`message ${msg.sender}`}>
                    <p>{msg.text}</p>
                  </div>
                ))}
                {isTyping && (
                  <div className="message ai">
                    <div className="typing-indicator"><span></span><span></span><span></span></div>
                  </div>
                )}
                <div ref={messagesEndRef} />
              </div>
              <div className="chat-input">
                <input
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  placeholder="Ask a question..."
                  onKeyPress={e => e.key === 'Enter' && handleSend()}
                />
                <button onClick={handleSend}><i className="fas fa-paper-plane"></i></button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ====== SMART CONTACT FORM ======
    function SmartContactForm() {
      const [formData, setFormData] = useState({ name: '', email: '', message: '' });
      const [suggestions, setSuggestions] = useState([]);
      const [submitted, setSubmitted] = useState(false);

      const getSuggestions = (text) => {
        const keywords = {
          'dashboard': 'We specialize in creating interactive dashboards with real-time data...',
          'automation': 'Our RPA solutions can automate 70% of your repetitive tasks...',
          'AI': 'We can help you implement predictive models that learn from your data...',
          'analytics': 'Our analytics team can uncover insights you haven\'t discovered yet...',
          'data': 'We provide end-to-end data solutions from collection to visualization.',
          'machine': 'Our machine learning models are built for practical business outcomes.'
        };
        return Object.entries(keywords)
          .filter(([key]) => text.toLowerCase().includes(key))
          .map(([key, value]) => ({ trigger: key, suggestion: value }));
      };

      const handleMessageChange = (e) => {
        const value = e.target.value;
        setFormData(prev => ({ ...prev, message: value }));
        if (value.length > 3) {
          setSuggestions(getSuggestions(value));
        } else {
          setSuggestions([]);
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setSubmitted(true);
      };

      if (submitted) {
        return (
          <div className="form-success show">
            <strong>✓ Message received.</strong> Thanks for reaching out — we'll get back to you within 24 hours.
          </div>
        );
      }

      return (
        <form className="contact-form" onSubmit={handleSubmit}>
          <label htmlFor="name">Your Name</label>
          <input type="text" id="name" placeholder="Jane Wanjiru" required value={formData.name} onChange={e => setFormData(prev => ({ ...prev, name: e.target.value }))} />
          <label htmlFor="email">Email Address</label>
          <input type="email" id="email" placeholder="jane@example.com" required value={formData.email} onChange={e => setFormData(prev => ({ ...prev, email: e.target.value }))} />
          <label htmlFor="message">Message</label>
          <textarea id="message" rows="4" placeholder="Tell us about your project..." required value={formData.message} onChange={handleMessageChange} />
          {suggestions.length > 0 && (
            <div className="ai-suggestions">
              <h4>🤖 AI Suggestions</h4>
              {suggestions.map((s, i) => (
                <div key={i} className="suggestion" onClick={() => setFormData(prev => ({ ...prev, message: prev.message + '\n\n' + s.suggestion }))}>
                  <span className="badge">{s.trigger}</span>
                  <p>{s.suggestion}</p>
                </div>
              ))}
            </div>
          )}
          <button type="submit" className="btn-primary">Send Message <i className="fas fa-paper-plane" style={{ marginLeft: '8px' }}></i></button>
        </form>
      );
    }
